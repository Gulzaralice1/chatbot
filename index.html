<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LPU MindMate AI | Stress Management Chatbot with Gemini</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #d4e0f7 0%, #b8c9e8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* main chatbot container */
    .chatbot-container {
      max-width: 600px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.4), 0 4px 12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* header with LPU branding + AI badge */
    .chat-header {
      background: linear-gradient(98deg, #0a2b44 0%, #1e4a76 100%);
      padding: 1.2rem 1.5rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 3px solid #ffcd6b;
    }

    .avatar {
      background: #ffcd6b;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #0a2b44;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .header-text h2 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ai-badge {
      background: rgba(255,205,107,0.2);
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: 40px;
      font-weight: 500;
      border: 0.5px solid #ffcd6b;
    }

    .header-text p {
      font-size: 0.7rem;
      opacity: 0.9;
      margin-top: 5px;
    }

    .lpu-tag {
      background: rgba(255,255,255,0.15);
      border-radius: 40px;
      padding: 3px 10px;
      font-size: 0.65rem;
      display: inline-block;
      margin-top: 5px;
    }

    /* chat messages area */
    .chat-messages {
      background: #f7fafd;
      height: 420px;
      overflow-y: auto;
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    /* message bubbles */
    .message {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 88%;
      animation: fadeSlideUp 0.25s ease;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bot-message {
      align-self: flex-start;
    }

    .user-message {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-icon {
      width: 34px;
      height: 34px;
      background: #e9edf2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    .bot-message .msg-icon {
      background: #1e4a76;
      color: white;
    }

    .user-message .msg-icon {
      background: #ffcd6b;
      color: #1e3a5f;
    }

    .msg-bubble {
      background: white;
      padding: 10px 15px;
      border-radius: 22px;
      border-top-left-radius: 5px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      font-size: 0.9rem;
      line-height: 1.45;
      color: #1f2a44;
      word-break: break-word;
    }

    .user-message .msg-bubble {
      background: #0a2b44;
      color: white;
      border-top-right-radius: 5px;
      border-top-left-radius: 22px;
    }

    /* quick action chips */
    .quick-actions {
      padding: 0.8rem 1rem;
      background: #ffffff;
      border-top: 1px solid #e9edf2;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid #eef2f8;
    }

    .chip {
      background: #f0f4fa;
      padding: 7px 15px;
      border-radius: 40px;
      font-size: 0.78rem;
      font-weight: 500;
      color: #1e4a76;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      font-family: inherit;
    }

    .chip i {
      font-size: 0.75rem;
    }

    .chip:hover {
      background: #e0e9f5;
      transform: scale(0.96);
    }

    /* input area */
    .input-area {
      background: white;
      padding: 1rem 1rem 1.2rem;
      display: flex;
      gap: 10px;
      border-top: 1px solid #eef2f8;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 60px;
      padding: 12px 18px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: 0.2s;
    }

    .input-area input:focus {
      border-color: #ffcd6b;
      box-shadow: 0 0 0 3px rgba(255,205,107,0.2);
    }

    .input-area button {
      background: #0a2b44;
      border: none;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 60px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .input-area button:hover {
      background: #ffcd6b;
      color: #0a2b44;
      transform: scale(0.96);
    }

    .footer-note {
      background: #fef9e6;
      text-align: center;
      font-size: 0.7rem;
      padding: 10px;
      color: #4a5568;
      border-top: 1px solid #ffe6b3;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .api-status {
      font-size: 0.65rem;
      background: #eef2ff;
      border-radius: 20px;
      padding: 2px 10px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /* scrollbar */
    .chat-messages::-webkit-scrollbar {
      width: 5px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: #eef2f9;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .typing-bubble i {
      margin-right: 5px;
    }
  </style>
</head>
<body>
<div class="chatbot-container">
  <div class="chat-header">
    <div class="avatar">
      <i class="fas fa-brain"></i>
    </div>
    <div class="header-text">
      <h2>MindMate AI <span class="ai-badge"><i class="fas fa-microchip"></i> Gemini AI</span></h2>
      <p>Stress companion for LPU students | 24/7 support</p>
      <span class="lpu-tag"><i class="fas fa-university"></i> Lovely Professional University</span>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <!-- quick suggestion chips based on common stressors -->
  <div class="quick-actions">
    <button class="chip" data-quick="exam"><i class="fas fa-book-open"></i> Exam anxiety</button>
    <button class="chip" data-quick="assignment"><i class="fas fa-tasks"></i> Assignment overload</button>
    <button class="chip" data-quick="sleep"><i class="fas fa-moon"></i> Sleep issues</button>
    <button class="chip" data-quick="motivation"><i class="fas fa-heart"></i> Low motivation</button>
    <button class="chip" data-quick="breathing"><i class="fas fa-lungs"></i> Breathing exercise</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your feelings... I'm here for you 💙" autocomplete="off">
    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
  </div>
  <div class="footer-note">
    <i class="fas fa-shield-alt"></i> Confidential & caring · Powered by Google Gemini
    <span id="apiStatusBadge" class="api-status"><i class="fas fa-circle-nodes"></i> AI ready</span>
  </div>
</div>

<script>
  // ======================== GEMINI AI CONFIGURATION ========================
  // 🔑 PASTE YOUR GEMINI API KEY HERE (Get it free from https://aistudio.google.com/apikey)
  const GEMINI_API_KEY = "AIzaSyCEZ18i6fDcmL69UbwH9OEHC3rbMRCTSnU";  // <--- REPLACE WITH YOUR ACTUAL API KEY
  
  const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent";
  
  // Conversation memory (for context, keeps last 12 exchanges)
  let conversationHistory = [];
  let userName = null;
  
  // DOM elements
  const messagesContainer = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const apiStatusSpan = document.getElementById('apiStatusBadge');
  
  // ======================== UI HELPERS ========================
  function addMessage(sender, text, isUser = false) {
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message');
    if (isUser) {
      messageDiv.classList.add('user-message');
    } else {
      messageDiv.classList.add('bot-message');
    }
    const iconSpan = document.createElement('div');
    iconSpan.classList.add('msg-icon');
    if (isUser) {
      iconSpan.innerHTML = '<i class="fas fa-user-graduate"></i>';
    } else {
      iconSpan.innerHTML = '<i class="fas fa-robot"></i>';
    }
    const bubbleSpan = document.createElement('div');
    bubbleSpan.classList.add('msg-bubble');
    bubbleSpan.innerText = text;
    messageDiv.appendChild(iconSpan);
    messageDiv.appendChild(bubbleSpan);
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }
  
  // Show typing indicator (Gemini is thinking)
  let typingIndicatorElement = null;
  function showTyping() {
    if (typingIndicatorElement) removeTyping();
    const typingDiv = document.createElement('div');
    typingDiv.classList.add('message', 'bot-message');
    typingDiv.id = 'typingIndicator';
    const typingIcon = document.createElement('div');
    typingIcon.classList.add('msg-icon');
    typingIcon.innerHTML = '<i class="fas fa-robot"></i>';
    const typingBubble = document.createElement('div');
    typingBubble.classList.add('msg-bubble', 'typing-bubble');
    typingBubble.style.background = "#eef2ff";
    typingBubble.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Gemini AI is thinking...';
    typingDiv.appendChild(typingIcon);
    typingDiv.appendChild(typingBubble);
    messagesContainer.appendChild(typingDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    typingIndicatorElement = typingDiv;
  }
  
  function removeTyping() {
    if (typingIndicatorElement) {
      typingIndicatorElement.remove();
      typingIndicatorElement = null;
    }
  }
  
  // update API status badge
  function updateApiStatus(working) {
    if (working) {
      apiStatusSpan.innerHTML = '<i class="fas fa-check-circle"></i> Gemini AI active';
      apiStatusSpan.style.background = "#dff9e6";
      apiStatusSpan.style.color = "#0e6b3e";
    } else {
      apiStatusSpan.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Fallback mode (no API)';
      apiStatusSpan.style.background = "#fff0db";
      apiStatusSpan.style.color = "#b45f06";
    }
  }
  
  // ======================== GEMINI CALL (with fallback) ========================
  async function getGeminiResponse(userMessage) {
    // check if API key is provided and not placeholder
    const hasValidKey = GEMINI_API_KEY && GEMINI_API_KEY !== "YOUR_GEMINI_API_KEY";
    
    if (!hasValidKey) {
      updateApiStatus(false);
      return getFallbackResponse(userMessage);
    }
    
    // Build system prompt for LPU stress management
    const systemInstruction = `You are MindMate AI, a compassionate stress & mental wellness chatbot for Lovely Professional University (LPU) students in India. 
Your role: Provide emotional support, stress management tips, study-life balance advice, breathing exercises, and coping strategies. 
Tone: Warm, empathetic, encouraging, and professional. Keep responses relatively short (2-5 sentences max). Use simple English, occasional emojis, and be culturally sensitive to Indian students. 
If a student expresses severe distress or suicidal thoughts, gently guide them to professional helplines (iCall: 9152987821 or LPU Wellness Centre). 
Never give medical diagnosis. Offer practical actions: deep breathing, 5-min breaks, Pomodoro technique, talking to friends, journaling, etc. 
Student's name: ${userName ? userName : "a student"}. Be personal and caring.`;
    
    // Add current message to history for context
    conversationHistory.push({ role: "user", content: userMessage });
    
    // Keep last 12 exchanges (max 24 messages) to avoid token overflow
    if (conversationHistory.length > 24) {
      conversationHistory = conversationHistory.slice(-24);
    }
    
    // Format conversation for Gemini
    let chatContext = "";
    for (let i = 0; i < conversationHistory.length; i++) {
      const msg = conversationHistory[i];
      const roleLabel = msg.role === "user" ? "Student" : "MindMate";
      chatContext += `${roleLabel}: ${msg.content}\n`;
    }
    
    const fullPrompt = `${systemInstruction}\n\nConversation so far:\n${chatContext}\nMindMate:`;
    
    try {
      const response = await fetch(`${GEMINI_URL}?key=${GEMINI_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: fullPrompt }] }],
          generationConfig: {
            temperature: 0.75,
            maxOutputTokens: 280,
            topP: 0.9,
          }
        })
      });
      
      const data = await response.json();
      if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
        const botReply = data.candidates[0].content.parts[0].text.trim();
        // store bot reply in history
        conversationHistory.push({ role: "assistant", content: botReply });
        updateApiStatus(true);
        return botReply;
      } else {
        console.warn("Gemini returned empty or error", data);
        updateApiStatus(false);
        return getFallbackResponse(userMessage);
      }
    } catch (err) {
      console.error("Gemini API fetch error:", err);
      updateApiStatus(false);
      return getFallbackResponse(userMessage);
    }
  }
  
  // ======================== FALLBACK RESPONSES (rule-based, human-like) ========================
  function getFallbackResponse(userMsg) {
    let msg = userMsg.toLowerCase().trim();
    // name capture for fallback too
    if ((msg.includes("my name is") || msg.includes("i'm ") || msg.includes("i am ")) && !userName) {
      let extracted = "";
      if (msg.includes("my name is")) extracted = msg.split("my name is")[1].trim();
      else if (msg.includes("i'm ")) extracted = msg.split("i'm ")[1].trim();
      else if (msg.includes("i am ")) extracted = msg.split("i am ")[1].trim();
      if (extracted && extracted.length < 25) {
        userName = extracted.charAt(0).toUpperCase() + extracted.slice(1);
        return `Great to meet you, ${userName}! 🌟 I'm MindMate (fallback mode, but still caring!). How are you feeling today? You can share exam stress, homesickness, or anything. 💙`;
      }
    }
    
    if (!userName && msg.length > 0 && !msg.includes("name")) {
      return "Hey there! 😊 I'd love to know your name first (just say 'My name is ____'). It helps me connect better, even in offline mode!";
    }
    
    // keywords for common stressors
    if (msg.includes("exam") || msg.includes("test") || msg.includes("mid")) 
      return `📚 Exams can spike anxiety, ${userName || "friend"}! Try the 5-4-3-2-1 grounding technique: name 5 things you see, 4 you touch, 3 you hear, 2 you smell, 1 you taste. Also, study in small blocks — you've got this! 🧠`;
    if (msg.includes("assignment") || msg.includes("project") || msg.includes("deadline"))
      return `📝 Assignment stress is common at LPU. Break down tasks into tiny steps and start with just 10 minutes. After that, reward yourself with a short walk! Need a motivational boost? 😊`;
    if (msg.includes("sleep") || msg.includes("tired") || msg.includes("insomnia"))
      return `😴 Quality sleep resets your mind. Try a 'digital sunset' — switch off screens 30 mins before bed, listen to calm music, and do slow breathing. I believe better rest will help you ace your day. 🌙`;
    if (msg.includes("motivation") || msg.includes("unmotivated") || msg.includes("energy"))
      return `💪 Low motivation happens to everyone, ${userName || "champ"}! Set a 5-min timer and start the smallest possible task. Action creates momentum. Also, think of one small win from yesterday. You're capable! ✨`;
    if (msg.includes("breathe") || msg.includes("breathing") || msg.includes("relax"))
      return `🌬️ Let's do box breathing: Inhale 4 sec → hold 4 sec → exhale 4 sec → hold 4 sec. Repeat 3 times. Feel the calm? You can use this before presentations or exams. Need another technique? Just ask!`;
    if (msg.includes("anxiety") || msg.includes("panic") || msg.includes("worried"))
      return `🌀 Anxiety is tough, but you're stronger. Try naming 3 things you can hear right now, 2 you can smell, and 1 sensation in your body. Grounding reduces panic. Also, LPU has counselors — would you like the helpline? 💚`;
    if (msg.includes("helpline") || msg.includes("counselor"))
      return `📞 You are not alone. LPU Wellness Centre: reach your mentor or visit the student support office. Also, iCall mental health helpline: 9152987821 (Mon-Sat 10am-8pm). I'm always here to listen too. ❤️`;
    if (msg.includes("lonely") || msg.includes("homesick"))
      return `🏠 Feeling homesick is natural, especially at university. Try joining an LPU club, calling family, or spending time at the student lounge. You belong here, and I'm here for you anytime. 💫`;
    if (msg.includes("thank"))
      return `You're so welcome, ${userName || "friend"}! 🌻 Remember, taking care of your mind is a strength. Chat with me whenever you feel heavy. You've got a whole community at LPU!`;
    
    return `💙 Thanks for opening up, ${userName || "dear student"}. I'm here to support you through stress, academics, or just daily life at LPU. Would you like to talk about exams, time management, friendships, or a quick relaxation tip? Just tell me what's on your mind. 🙏`;
  }
  
  // ======================== MAIN MESSAGE HANDLER (Gemini + fallback) ========================
  async function processUserMessage(messageText) {
    if (!messageText.trim()) return;
    // display user message
    addMessage('user', messageText, true);
    userInput.value = '';
    
    // Show typing indicator
    showTyping();
    
    let botReply;
    // try gemini if key valid, else fallback
    const hasValidKey = GEMINI_API_KEY && GEMINI_API_KEY !== "YOUR_GEMINI_API_KEY";
    if (hasValidKey) {
      botReply = await getGeminiResponse(messageText);
    } else {
      botReply = getFallbackResponse(messageText);
    }
    
    removeTyping();
    addMessage('bot', botReply, false);
    
    // if fallback mode captured name in message, sync
    if (!userName && messageText.toLowerCase().includes("my name is")) {
      let nameMatch = messageText.match(/my name is (\w+)/i);
      if (nameMatch) userName = nameMatch[1].charAt(0).toUpperCase() + nameMatch[1].slice(1);
      else if (messageText.toLowerCase().includes("i'm ")) {
        let parts = messageText.split("i'm ");
        if (parts[1]) userName = parts[1].trim().split(" ")[0];
      }
    }
  }
  
  // ======================== INITIAL GREETING + NAME PROMPT ========================
  function initChat() {
    const welcomeMsg = "🌸 Hello! I'm MindMate AI, your personal stress management companion at Lovely Professional University. I use Google Gemini to understand you better. What's your name? (You can say 'My name is ___') 💙";
    addMessage('bot', welcomeMsg, false);
    // check API status display
    if (!GEMINI_API_KEY || GEMINI_API_KEY === "YOUR_GEMINI_API_KEY") {
      updateApiStatus(false);
      const fallbackNote = "⚠️ Gemini API key missing. Using smart fallback responses. To enable full AI, get a free key from Google AI Studio and paste it into the code (line ~150).";
      setTimeout(() => {
        addMessage('bot', fallbackNote, false);
      }, 800);
    } else {
      updateApiStatus(true);
    }
  }
  
  // ======================== EVENT LISTENERS ========================
  sendBtn.addEventListener('click', () => {
    const text = userInput.value.trim();
    if (text) processUserMessage(text);
  });
  
  userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const text = userInput.value.trim();
      if (text) processUserMessage(text);
    }
  });
  
  // Quick action chips (with dynamic prompts)
  const chips = document.querySelectorAll('.chip');
  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      const action = chip.getAttribute('data-quick');
      let predefinedMsg = "";
      switch(action) {
        case "exam": predefinedMsg = "I'm really stressed about my upcoming exams. Can you help me calm down and study effectively?"; break;
        case "assignment": predefinedMsg = "I feel overwhelmed with too many assignments and tight deadlines. What should I do?"; break;
        case "sleep": predefinedMsg = "I haven't been sleeping well due to stress. Do you have any tips for better sleep?"; break;
        case "motivation": predefinedMsg = "I feel completely demotivated and I'm struggling to focus on anything. Please help me."; break;
        case "breathing": predefinedMsg = "Can you guide me through a quick breathing exercise to reduce stress right now?"; break;
        default: predefinedMsg = "I need some advice to manage stress as an LPU student.";
      }
      processUserMessage(predefinedMsg);
    });
  });
  
  // start the chatbot
  initChat();
</script>
</body>
</html>
